# Phase 7 — GitHub Actions Scheduler (docs/deployment-plan.md §3)
# After non–dry-run commits, Render auto-deploys if linked to this repo.
# Optional deploy hook: add secret RENDER_DEPLOY_HOOK and uncomment step below.
name: Daily Medical Corpus Ingest

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 IST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (offline fixture + no commit)"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Cron has no workflow_dispatch inputs — default scheduled runs to dry_run (prototype-safe).
    env:
      INGEST_DRY_RUN: ${{ github.event_name != 'workflow_dispatch' && 'true' || github.event.inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest (Nature-only)
        env:
          PYTHONPATH: src
        run: |
          if [ "$INGEST_DRY_RUN" = "true" ]; then
            python -m scraper.scheduler --fixture
          else
            python -m scraper.scheduler
          fi

      - name: Chunk documents
        env:
          PYTHONPATH: src
        run: python -m pipeline.chunking.run --manifest data/manifest.json --repo-root .

      - name: Embed + upsert into Chroma
        env:
          PYTHONPATH: src
          CHROMA_PATH: ./chroma_db
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
        run: |
          if [ "$INGEST_DRY_RUN" = "true" ]; then
            export EMBED_MOCK=true
          fi
          python -m pipeline.index.chroma_upsert --repo-root .

      - name: Phase 7 validations (offline, quota-safe)
        env:
          PYTHONPATH: src
          EMBED_MOCK: true
          GROQ_MOCK: true
          CHROMA_PATH: ./chroma_db
        run: pytest tests/phase7/ tests/phase2/test_nature_url.py -v

      - name: Commit artifacts (skip on dry run)
        if: env.INGEST_DRY_RUN != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(ingest): daily corpus and chroma sync'
          file_pattern: chroma_db/** data/manifest.json data/ingest_log.jsonl data/chunks/**

      # - name: Trigger Render redeploy (optional)
      #   if: env.INGEST_DRY_RUN != 'true'
      #   run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
