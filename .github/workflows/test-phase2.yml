name: Phase 2 Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  phase2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Phase 2 tests + Phase 1 regression
        env:
          PYTHONPATH: src
        run: |
          pytest tests/phase2/ -v
          pytest tests/regression/test_phase1_smoke.py -v
