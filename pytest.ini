[pytest]
pythonpath = src
testpaths = tests
asyncio_mode = auto
# Default: no real API calls. Live tests: pytest -m live (max 5 calls, see tests/live_api_budget.py)
addopts = -m "not live"
markers =
    live: real Groq/HF API — strict max 5 calls/session; requires live_api_call fixture
filterwarnings =
    ignore::DeprecationWarning
