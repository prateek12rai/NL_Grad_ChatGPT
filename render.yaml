# Render Blueprint — FastAPI backend (see docs/deployment-plan.md)
# Use region: oregon for free tier (Singapore free deploys often fail).
services:
  - type: web
    name: chatgpt-glass-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements-render.txt
    startCommand: PYTHONPATH=./src uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONPATH
        value: src
      - key: CHROMA_PATH
        value: ./chroma_db
      - key: EMBED_MOCK
        value: "true"
      - key: GROQ_MOCK
        value: "false"
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:5174
      - key: HUGGINGFACE_API_TOKEN
        value: ""
      - key: GROQ_API_KEY
        sync: false
